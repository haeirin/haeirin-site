<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>회원가입 | 해이린</title>

  <style>
    body {
      font-family: 'Arial', sans-serif;
      background: #f5f7fa;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 400px;
      background: #fff;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: 1px solid #ddd;
      border-radius: 5px;
    }

    .row {
      display: flex;
      gap: 10px;
    }

    .row input {
      flex: 1;
    }

    button {
      width: 100%;
      margin-top: 20px;
      padding: 12px;
      background: #00c2a8;
      border: none;
      color: white;
      font-size: 16px;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #00a891;
    }

    .note {
      font-size: 12px;
      color: #888;
      margin-top: 5px;
    }

    .error {
      color: red;
      font-size: 12px;
      margin-top: 5px;
    }

    .agree-box {
      margin-top: 15px;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 5px;
      height: 80px;
      overflow-y: auto;
      font-size: 12px;
      background: #fafafa;
    }

    .checkbox-area {
      margin-top: 10px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
  </style>

  <!-- 다음 주소 API -->
  <script src="https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>

</head>

<body>

<div class="container">
  <h2>회원가입</h2>

  <form onsubmit="return validateForm()">

    <label>닉네임</label>
    <input type="text" required>

    <label>이름</label>
    <input type="text" required>

    <label>이메일</label>
    <input type="email" required>

    <label>전화번호</label>
    <input type="tel" required>

    <label>비밀번호</label>
    <input type="password" id="password" placeholder="숫자 6자리 이상" required>
    <div class="note">※ 숫자 6자리 이상 입력</div>
    <div id="pwError" class="error"></div>

    <label>주소</label>

    <div class="row">
      <input type="text" id="postcode" placeholder="우편번호" readonly>
      <button type="button" onclick="execDaumPostcode()">검색</button>
    </div>

    <input type="text" id="address" placeholder="도로명 주소" readonly>
    <input type="text" placeholder="상세 주소 입력">

    <!-- 개인정보 동의 -->
    <label>개인정보 수집 및 이용 동의</label>

    <div class="agree-box">
      본 서비스는 회원가입을 위해 아래와 같은 개인정보를 수집합니다.<br><br>
      - 수집항목: 이름, 닉네임, 이메일, 전화번호, 주소<br>
      - 이용목적: 상품 배송 및 고객 응대<br>
      - 보관기간: 회원 탈퇴 시까지<br><br>
      ※ 동의를 거부할 수 있으나, 거부 시 회원가입이 제한됩니다.
    </div>

    <div class="checkbox-area">
      <input type="checkbox" id="agree">
      <label for="agree">위 내용을 확인하였으며 동의합니다 (필수)</label>
    </div>
    <div id="agreeError" class="error"></div>

    <button type="submit">가입하기</button>

  </form>
</div>

<script>
function execDaumPostcode() {
  new daum.Postcode({
    oncomplete: function(data) {
      document.getElementById('postcode').value = data.zonecode;
      document.getElementById('address').value = data.roadAddress;
    }
  }).open();
}

function validateForm() {
  const pw = document.getElementById("password").value;
  const agree = document.getElementById("agree").checked;

  const pwError = document.getElementById("pwError");
  const agreeError = document.getElementById("agreeError");

  const isNumber = /^[0-9]+$/;

  // 비밀번호 체크
  if (!isNumber.test(pw)) {
    pwError.innerText = "비밀번호는 숫자만 입력해주세요.";
    return false;
  }

  if (pw.length < 6) {
    pwError.innerText = "비밀번호는 6자리 이상 입력해주세요.";
    return false;
  }

  pwError.innerText = "";

  // 동의 체크
  if (!agree) {
    agreeError.innerText = "개인정보 수집 및 이용에 동의해주세요.";
    return false;
  }

  agreeError.innerText = "";

  alert("회원가입 완료!");
  return true;
}
</script>

</body>
</html>
