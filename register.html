<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>회원가입 | 해이린</title>

  <style>
    body {
      font-family: 'Arial', sans-serif;
      background: #f5f7fa;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 400px;
      background: #fff;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: 1px solid #ddd;
      border-radius: 5px;
    }

    .row {
      display: flex;
      gap: 10px;
    }

    .row input {
      flex: 1;
    }

    button {
      width: 100%;
      margin-top: 20px;
      padding: 12px;
      background: #00c2a8;
      border: none;
      color: white;
      font-size: 16px;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #00a891;
    }

    .note {
      font-size: 12px;
      color: #888;
      margin-top: 5px;
    }

    .error {
      color: red;
      font-size: 12px;
      margin-top: 5px;
    }

    .agree-box {
      margin-top: 15px;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 5px;
      height: 80px;
      overflow-y: auto;
      font-size: 12px;
      background: #fafafa;
    }

    .checkbox-area {
      margin-top: 10px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
  </style>

  <!-- 다음 주소 API -->
  <script src="https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>

</head>

<body>

<div class="container">
  <h2>회원가입</h2>

  <form onsubmit="return validateForm()">

    <label>닉네임</label>
    <input id="nickname" type="text" required>

    <label>이름</label>
    <input id="name" type="text" required>

    <label>이메일</label>
    <input id="email" type="email" required>

    <label>전화번호</label>
    <input id="phone" type="tel" required>

    <label>비밀번호</label>
    <input type="password" id="password" placeholder="숫자 6자리 이상" required>
    <div class="note">※ 숫자 6자리 이상 입력</div>
    <div id="pwError" class="error"></div>

    <label>주소</label>

    <div class="row">
      <input type="text" id="postcode" placeholder="우편번호" readonly>
      <button type="button" onclick="execDaumPostcode()">검색</button>
    </div>

    <input type="text" id="address" placeholder="도로명 주소" readonly>
    <input type="text" id="detailAddress" placeholder="상세 주소 입력">

    <label>개인정보 수집 및 이용 동의</label>

    <div class="agree-box">
      수집항목: 이름, 닉네임, 이메일, 전화번호, 주소<br>
      이용목적: 상품 배송 및 고객 응대<br>
      보관기간: 회원 탈퇴 시까지<br><br>
      ※ 동의하지 않으면 가입 불가
    </div>

    <div class="checkbox-area">
      <input type="checkbox" id="agree">
      <label for="agree">동의합니다 (필수)</label>
    </div>
    <div id="agreeError" class="error"></div>

    <button type="submit">가입하기</button>

  </form>
</div>

<script>
function execDaumPostcode() {
  new daum.Postcode({
    oncomplete: function(data) {
      document.getElementById('postcode').value = data.zonecode;
      document.getElementById('address').value = data.roadAddress;
    }
  }).open();
}

function validateForm() {
  const nickname = document.getElementById("nickname").value;
  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const phone = document.getElementById("phone").value;
  const password = document.getElementById("password").value;
  const address = document.getElementById("address").value;
  const detailAddress = document.getElementById("detailAddress").value;
  const agree = document.getElementById("agree").checked;

  const pwError = document.getElementById("pwError");
  const agreeError = document.getElementById("agreeError");

  const isNumber = /^[0-9]+$/;

  if (!isNumber.test(password)) {
    pwError.innerText = "비밀번호는 숫자만 입력해주세요.";
    return false;
  }

  if (password.length < 6) {
    pwError.innerText = "비밀번호는 6자리 이상 입력해주세요.";
    return false;
  }

  pwError.innerText = "";

  if (!agree) {
    agreeError.innerText = "개인정보 동의는 필수입니다.";
    return false;
  }

  agreeError.innerText = "";

  const user = {
    nickname,
    name,
    email,
    phone,
    password,
    address,
    detailAddress
  };

  localStorage.setItem("user", JSON.stringify(user));

  alert("회원가입 완료!");
  window.location.href = "login.html";

  return false;
}
</script>

</body>
</html>
