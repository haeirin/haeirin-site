<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>마이페이지 - My Shop</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ── 전체 레이아웃 ── */
    .mp-wrap {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 20px 60px;
    }

    /* ── 상단 프로필 카드 ── */
    .mp-profile-card {
      background: linear-gradient(135deg, #0d9488, #0f766e);
      border-radius: var(--radius-lg);
      padding: 28px 32px;
      color: white;
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 24px;
      box-shadow: var(--shadow-lg);
    }
    .mp-avatar {
      width: 64px; height: 64px;
      background: rgba(255,255,255,0.25);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; flex-shrink: 0;
      border: 3px solid rgba(255,255,255,0.5);
    }
    .mp-profile-name { font-size: 20px; font-weight: 800; margin-bottom: 4px; }
    .mp-profile-sub  { font-size: 13px; opacity: 0.8; }

    /* ── 탭 ── */
    .mp-tabs {
      display: flex;
      gap: 0;
      background: white;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
      margin-bottom: 24px;
      box-shadow: var(--shadow-sm);
    }
    .mp-tab {
      flex: 1;
      padding: 14px 12px;
      text-align: center;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      color: var(--text-muted);
      border-right: 1px solid var(--border);
      transition: all 0.18s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .mp-tab:last-child { border-right: none; }
    .mp-tab:hover { background: var(--primary-light); color: var(--primary); }
    .mp-tab.active {
      background: var(--primary);
      color: white;
    }

    /* ── 탭 콘텐츠 ── */
    .mp-panel { display: none; }
    .mp-panel.active { display: block; }

    /* ── 섹션 카드 ── */
    .mp-card {
      background: white;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      margin-bottom: 16px;
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }
    .mp-card-head {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      font-weight: 700;
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg);
    }
    .mp-card-body { padding: 20px; }

    /* ── 주문 카드 ── */
    .order-card {
      background: white;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 14px;
      overflow: hidden;
      transition: var(--transition);
      box-shadow: var(--shadow-sm);
    }
    .order-card:hover { box-shadow: var(--shadow); }
    .order-card-head {
      padding: 14px 20px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }
    .order-num {
      font-family: monospace;
      font-weight: 700;
      font-size: 14px;
      color: var(--primary);
    }
    .order-date { font-size: 12px; color: var(--text-muted); }
    .order-card-body { padding: 16px 20px; }

    .order-item-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .order-item-row:last-child { border-bottom: none; }
    .order-item-img {
      width: 56px; height: 56px;
      border-radius: 8px; background: #f1f5f9;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; flex-shrink: 0;
      border: 1px solid var(--border); overflow: hidden;
    }
    .order-item-img img { width: 100%; height: 100%; object-fit: cover; }
    .order-item-info { flex: 1; }
    .order-item-name { font-weight: 700; font-size: 14px; margin-bottom: 3px; }
    .order-item-opts {
      font-size: 12px; color: var(--text-muted);
      display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 3px;
    }
    .order-item-opt {
      background: var(--bg); padding: 1px 8px;
      border-radius: 100px; border: 1px solid var(--border);
    }
    .order-item-price { font-weight: 800; font-size: 14px; color: var(--primary); white-space: nowrap; }

    .order-card-foot {
      padding: 12px 20px;
      background: var(--primary-light);
      border-top: 1px solid var(--primary-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }
    .order-total { font-size: 15px; font-weight: 800; color: var(--primary); }
    .order-status-group { display: flex; align-items: center; gap: 10px; }

    /* ── 진행 상태 바 ── */
    .status-track {
      display: flex;
      align-items: center;
      gap: 0;
      margin: 16px 0;
      overflow-x: auto;
      padding-bottom: 4px;
    }
    .status-step {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 72px;
      position: relative;
    }
    .status-step::after {
      content: '';
      position: absolute;
      top: 14px;
      left: 50%;
      width: 100%;
      height: 2px;
      background: var(--border);
      z-index: 0;
    }
    .status-step:last-child::after { display: none; }
    .status-dot {
      width: 28px; height: 28px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: white;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      position: relative; z-index: 1;
      margin-bottom: 5px;
    }
    .status-dot.done { background: var(--primary); border-color: var(--primary); color: white; }
    .status-dot.current { background: white; border-color: var(--primary); color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); }
    .status-label { font-size: 10px; color: var(--text-muted); text-align: center; white-space: nowrap; }
    .status-label.done    { color: var(--primary); font-weight: 700; }
    .status-label.current { color: var(--primary); font-weight: 800; }

    /* ── 내 정보 폼 ── */
    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    @media(max-width: 600px) { .info-grid { grid-template-columns: 1fr; } }

    .info-field-group { margin-bottom: 18px; }
    .info-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    .info-value-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 11px 14px;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }

    /* ── 비밀번호 변경 ── */
    .pw-section {
      background: #fff8f0;
      border: 1.5px solid #fed7aa;
      border-radius: var(--radius);
      padding: 20px;
      margin-top: 4px;
    }
    .pw-section-title {
      font-size: 14px; font-weight: 800;
      color: #92400e; margin-bottom: 14px;
      display: flex; align-items: center; gap: 6px;
    }

    /* ── 빈 상태 ── */
    .mp-empty {
      text-align: center; padding: 60px 20px; color: var(--text-muted);
    }
    .mp-empty .icon { font-size: 56px; margin-bottom: 16px; }
    .mp-empty h3 { font-size: 18px; font-weight: 700; margin-bottom: 8px; color: var(--text); }
    .mp-empty p { font-size: 14px; margin-bottom: 20px; }

    /* ── 뱃지 ── */
    .badge-pending         { background:#fef3c7; color:#92400e; }
    .badge-transfer        { background:#dbeafe; color:#1e40af; }
    .badge-payment         { background:#dcfce7; color:#166534; }
    .badge-shipped         { background:#ede9fe; color:#5b21b6; }
    .badge-delivered       { background:#d1fae5; color:#065f46; }
    .badge-cancelled       { background:#fee2e2; color:#991b1b; }

    @media(max-width: 600px) {
      .mp-profile-card { flex-direction: column; text-align: center; padding: 24px 16px; }
      .mp-tab { font-size: 12px; padding: 12px 8px; }
      .order-card-head { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
<header class="header" id="mainHeader"></header>

<main class="page-content">
  <div class="mp-wrap">

    <!-- 프로필 카드 -->
    <div class="mp-profile-card" id="profileCard">
      <div class="mp-avatar">👤</div>
      <div>
        <div class="mp-profile-name" id="profileName">로딩 중...</div>
        <div class="mp-profile-sub" id="profileSub"></div>
      </div>
    </div>

    <!-- 탭 버튼 -->
    <div class="mp-tabs">
      <div class="mp-tab active" id="tab-btn-orders" onclick="switchTab('orders')">
        📦 주문 내역
      </div>
      <div class="mp-tab" id="tab-btn-info" onclick="switchTab('info')">
        👤 내 정보
      </div>
      <div class="mp-tab" id="tab-btn-pw" onclick="switchTab('pw')">
        🔒 비밀번호 변경
      </div>
    </div>

    <!-- ① 주문 내역 패널 -->
    <div class="mp-panel active" id="panel-orders">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px;">
        <h2 style="font-size:18px;font-weight:800;">📦 주문 내역</h2>
        <select class="form-control" id="orderFilter" style="max-width:160px;" onchange="renderOrders()">
          <option value="">전체 상태</option>
          <option value="pending">결제 대기</option>
          <option value="transfer_confirmed">입금완료(고객)</option>
          <option value="payment_confirmed">결제 확인</option>
          <option value="shipped">배송 중</option>
          <option value="delivered">배송 완료</option>
          <option value="cancelled">취소됨</option>
        </select>
      </div>
      <div id="ordersContainer">
        <div style="text-align:center;padding:60px;color:var(--text-muted);">
          <div class="spinner" style="margin:0 auto 16px;"></div>불러오는 중...
        </div>
      </div>
    </div>

    <!-- ② 내 정보 패널 -->
    <div class="mp-panel" id="panel-info">
      <h2 style="font-size:18px;font-weight:800;margin-bottom:16px;">👤 내 정보 조회 / 수정</h2>

      <!-- 기본 정보 (읽기 전용) -->
      <div class="mp-card">
        <div class="mp-card-head">
          <span>기본 정보</span>
          <span style="font-size:12px;color:var(--text-muted);">가입 시 등록된 정보</span>
        </div>
        <div class="mp-card-body">
          <div class="info-grid">
            <div class="info-field-group">
              <div class="info-label">닉네임 (영문)</div>
              <div class="info-value-box" id="infoNickname">-</div>
            </div>
            <div class="info-field-group">
              <div class="info-label">이름</div>
              <div class="info-value-box" id="infoName">-</div>
            </div>
            <div class="info-field-group">
              <div class="info-label">이메일</div>
              <div class="info-value-box" id="infoEmail">-</div>
            </div>
            <div class="info-field-group">
              <div class="info-label">가입일</div>
              <div class="info-value-box" id="infoJoined">-</div>
            </div>
          </div>
        </div>
      </div>

      <!-- 수정 가능한 정보 -->
      <div class="mp-card">
        <div class="mp-card-head">
          <span>연락처 / 배송지 수정</span>
          <span style="font-size:12px;color:var(--text-muted);">변경 후 저장 버튼을 눌러주세요</span>
        </div>
        <div class="mp-card-body">
          <div class="form-group">
            <label class="form-label">휴대폰 번호</label>
            <input type="tel" class="form-control" id="editPhone" placeholder="010-0000-0000"
                   oninput="formatPhoneEdit(this)">
            <div class="form-hint">변경 시 로그인에도 사용되는 번호가 바뀝니다</div>
          </div>
          <div class="form-group">
            <label class="form-label">우편번호</label>
            <div style="display:flex;gap:8px;">
              <input type="text" class="form-control" id="editZipcode" placeholder="우편번호" style="max-width:140px;" readonly>
              <button type="button" class="btn btn-secondary" onclick="openAddrSearch()">🔍 주소 검색</button>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">기본 주소</label>
            <input type="text" class="form-control" id="editAddress" placeholder="도로명 주소" readonly>
          </div>
          <div class="form-group" style="margin-bottom:0;">
            <label class="form-label">상세 주소</label>
            <input type="text" class="form-control" id="editAddressDetail" placeholder="동/호수 등 상세 주소 입력">
          </div>
          <div style="margin-top:20px;">
            <button class="btn btn-primary btn-lg" onclick="saveInfo()" style="min-width:160px;">💾 정보 저장</button>
          </div>
        </div>
      </div>
    </div>

    <!-- ③ 비밀번호 변경 패널 -->
    <div class="mp-panel" id="panel-pw">
      <h2 style="font-size:18px;font-weight:800;margin-bottom:16px;">🔒 비밀번호 변경</h2>
      <div class="mp-card">
        <div class="mp-card-head"><span>새 비밀번호 설정</span></div>
        <div class="mp-card-body">
          <div style="background:#f0fdfa;border:1px solid var(--primary-border);border-radius:8px;padding:14px;margin-bottom:20px;font-size:13px;color:var(--primary);">
            ℹ️ 이 쇼핑몰은 <strong>전화번호로 로그인</strong>합니다. 비밀번호는 관리자 페이지 접근에만 사용됩니다.
          </div>
          <form onsubmit="savePw();return false;" autocomplete="off">
            <div class="form-group">
              <label class="form-label">현재 비밀번호</label>
              <input type="password" class="form-control" id="pwCurrent" placeholder="현재 비밀번호 입력" autocomplete="current-password">
            </div>
            <div class="form-group">
              <label class="form-label">새 비밀번호</label>
              <input type="password" class="form-control" id="pwNew" placeholder="새 비밀번호 (4자 이상)"
                     oninput="checkPwMatch()" autocomplete="new-password">
            </div>
            <div class="form-group" style="margin-bottom:0;">
              <label class="form-label">새 비밀번호 확인</label>
              <input type="password" class="form-control" id="pwConfirm" placeholder="새 비밀번호 다시 입력"
                     oninput="checkPwMatch()" autocomplete="new-password">
              <div id="pwMatchMsg" style="font-size:12px;margin-top:6px;"></div>
            </div>
            <div style="margin-top:20px;">
              <button type="submit" class="btn btn-primary btn-lg" style="min-width:160px;">🔒 비밀번호 변경</button>
            </div>
          </form>
        </div>
      </div>
    </div>

  </div><!-- /mp-wrap -->
</main>

<!-- 주문 상세 모달 -->
<div class="modal-overlay" id="orderDetailModal">
  <div class="modal modal-lg">
    <div class="modal-header">
      <div class="modal-title">📋 주문 상세</div>
      <button class="modal-close" onclick="closeModal('orderDetailModal')">✕</button>
    </div>
    <div class="modal-body" id="orderDetailBody"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('orderDetailModal')">닫기</button>
    </div>
  </div>
</div>

<div class="toast-container"></div>
<script src="js/utils.js"></script>
<script>
/* =====================================================
   전역 상태
===================================================== */
let currentUser   = null;
let userRecord    = null;   // DB에서 가져온 전체 사용자 레코드
let allMyOrders   = [];

const STATUS_MAP = {
  pending:            { label: '결제 대기',       badge: 'badge-pending',  icon: '⏳', step: 0 },
  transfer_confirmed: { label: '입금완료(고객)',   badge: 'badge-transfer', icon: '💰', step: 1 },
  payment_confirmed:  { label: '결제 확인',        badge: 'badge-payment',  icon: '✅', step: 2 },
  shipped:            { label: '배송 중',          badge: 'badge-shipped',  icon: '🚚', step: 3 },
  delivered:          { label: '배송 완료',        badge: 'badge-delivered',icon: '📬', step: 4 },
  cancelled:          { label: '취소됨',           badge: 'badge-cancelled',icon: '❌', step: -1 },
};

const STATUS_STEPS = [
  { key: 'pending',            label: '주문', icon: '📝' },
  { key: 'transfer_confirmed', label: '입금', icon: '💰' },
  { key: 'payment_confirmed',  label: '확인', icon: '✅' },
  { key: 'shipped',            label: '배송', icon: '🚚' },
  { key: 'delivered',          label: '완료', icon: '📬' },
];

/* =====================================================
   초기화
===================================================== */
async function init() {
  await renderHeader('mypage');

  currentUser = Auth.getUser();
  if (!currentUser) {
    toast('로그인이 필요합니다.', 'warning');
    setTimeout(() => { window.location.href = 'login.html?from=mypage.html'; }, 900);
    return;
  }

  // URL 파라미터로 탭 지정 가능
  const tab = new URLSearchParams(location.search).get('tab');
  if (tab) switchTab(tab);

  // 프로필 카드
  document.getElementById('profileName').textContent = currentUser.nickname;
  document.getElementById('profileSub').textContent  = `${currentUser.name} 님`;

  // 병렬 로드
  await Promise.all([loadUserRecord(), loadMyOrders()]);
}

/* =====================================================
   탭 전환
===================================================== */
function switchTab(name) {
  ['orders','info','pw'].forEach(t => {
    document.getElementById('panel-' + t).classList.remove('active');
    document.getElementById('tab-btn-' + t).classList.remove('active');
  });
  document.getElementById('panel-' + name).classList.add('active');
  document.getElementById('tab-btn-' + name).classList.add('active');
}

/* =====================================================
   사용자 DB 레코드 로드 → 내 정보 탭 채우기
===================================================== */
async function loadUserRecord() {
  try {
    const res = await API.get('users', { limit: 500 });
    const users = res.data || [];
    userRecord = users.find(u => u.id === currentUser.id) || null;

    if (!userRecord) return;

    // 기본 정보 표시
    document.getElementById('infoNickname').textContent = userRecord.nickname || '-';
    document.getElementById('infoName').textContent     = userRecord.name     || '-';
    document.getElementById('infoEmail').textContent    = userRecord.email    || '-';
    document.getElementById('infoJoined').textContent   = formatDate(userRecord.created_at);

    // 수정 가능 필드 채우기
    document.getElementById('editPhone').value         = userRecord.phone          || '';
    document.getElementById('editZipcode').value       = userRecord.zipcode        || '';
    document.getElementById('editAddress').value       = userRecord.address        || '';
    document.getElementById('editAddressDetail').value = userRecord.address_detail || '';

  } catch(e) {
    console.error('loadUserRecord error:', e);
  }
}

/* =====================================================
   내 주문 로드
===================================================== */
async function loadMyOrders() {
  try {
    const res = await API.get('orders', { limit: 500 });
    const all = res.data || [];
    // 내 주문만 필터 (user_id 또는 user_name·phone 기준)
    allMyOrders = all
      .filter(o => o.user_id === currentUser.id)
      .sort((a, b) => (b.created_at || 0) - (a.created_at || 0));
    renderOrders();
  } catch(e) {
    console.error('loadMyOrders error:', e);
    document.getElementById('ordersContainer').innerHTML =
      `<div class="mp-empty"><div class="icon">❌</div><h3>주문 내역을 불러오지 못했습니다</h3></div>`;
  }
}

/* =====================================================
   주문 목록 렌더링
===================================================== */
function renderOrders() {
  const filter    = document.getElementById('orderFilter')?.value || '';
  const filtered  = filter ? allMyOrders.filter(o => o.payment_status === filter) : allMyOrders;
  const container = document.getElementById('ordersContainer');

  if (filtered.length === 0) {
    container.innerHTML = `
      <div class="mp-empty">
        <div class="icon">📦</div>
        <h3>${filter ? '해당 상태의 주문이 없습니다' : '아직 주문 내역이 없습니다'}</h3>
        <p>쇼핑을 시작해보세요!</p>
        <a href="index.html" class="btn btn-primary">🛍️ 쇼핑하러 가기</a>
      </div>`;
    return;
  }

  container.innerHTML = filtered.map(order => {
    let items = [];
    try { items = JSON.parse(order.items || '[]'); } catch {}

    const st       = STATUS_MAP[order.payment_status] || { label: order.payment_status, badge: '', icon: '❓', step: 0 };
    const stepIdx  = st.step;
    const isCancelled = order.payment_status === 'cancelled';

    // 진행 상태 바
    const trackHtml = isCancelled
      ? `<div style="display:inline-flex;align-items:center;gap:6px;padding:6px 12px;background:#fee2e2;border-radius:100px;font-size:12px;font-weight:700;color:#991b1b;">❌ 취소된 주문</div>`
      : `<div class="status-track">
          ${STATUS_STEPS.map((s, i) => {
            const cls = i < stepIdx ? 'done' : i === stepIdx ? 'current' : '';
            return `
              <div class="status-step">
                <div class="status-dot ${cls}">${i <= stepIdx ? s.icon : ''}</div>
                <div class="status-label ${cls}">${s.label}</div>
              </div>`;
          }).join('')}
        </div>`;

    return `
      <div class="order-card">
        <div class="order-card-head">
          <div>
            <div class="order-num">${order.order_number}</div>
            <div class="order-date">${formatDate(order.created_at)}</div>
          </div>
          <span class="badge ${st.badge}" style="font-size:12px;padding:5px 10px;">${st.icon} ${st.label}</span>
        </div>
        <div class="order-card-body">
          ${trackHtml}
          ${items.map(item => `
            <div class="order-item-row">
              <div class="order-item-img">
                ${item.product_thumbnail
                  ? `<img src="${item.product_thumbnail}" alt="" onerror="this.parentElement.innerHTML='🛍️'">`
                  : '🛍️'}
              </div>
              <div class="order-item-info">
                <div class="order-item-name">${escH(item.product_name)}</div>
                <div class="order-item-opts">
                  ${item.selected_color ? `<span class="order-item-opt">🎨 ${escH(item.selected_color)}</span>` : ''}
                  ${item.selected_size  ? `<span class="order-item-opt">📏 ${escH(item.selected_size)}</span>`  : ''}
                  ${item.selected_extra ? `<span class="order-item-opt">➕ ${escH(item.selected_extra)}</span>` : ''}
                  <span class="order-item-opt">수량 ${item.quantity}개</span>
                </div>
              </div>
              <div class="order-item-price">${formatPrice(item.subtotal || item.product_price * item.quantity)}</div>
            </div>`).join('')}
        </div>
        <div class="order-card-foot">
          <div class="order-total">
            총 결제금액 &nbsp;
            <span style="font-size:18px;">${formatPrice(order.final_price)}</span>
            <span style="font-size:12px;font-weight:400;color:var(--text-muted);margin-left:6px;">
              (배송비 ${order.shipping_fee === 0 ? '무료' : formatPrice(order.shipping_fee)})
            </span>
          </div>
          <div class="order-status-group">
            ${order.payment_status === 'pending' ? `
              <button class="btn btn-sm btn-warning" onclick="confirmTransfer('${order.id}')">
                💰 입금 완료 알리기
              </button>` : ''}
            <button class="btn btn-sm btn-outline" onclick="viewOrderDetail('${order.id}')">
              상세보기
            </button>
          </div>
        </div>
      </div>`;
  }).join('');
}

/* =====================================================
   주문 상세 모달
===================================================== */

  const order = allMyOrders.find(o => o.id === orderId);
  if (!order) return;

  let items = [];
  try { items = JSON.parse(order.items || '[]'); } catch {}

  const st = STATUS_MAP[order.payment_status] || { label: order.payment_status, badge: '' };

  document.getElementById('orderDetailBody').innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;">
      <div>
        <div style="font-size:11px;color:var(--text-muted);font-weight:700;margin-bottom:3px;">주문번호</div>
        <div style="font-family:monospace;font-weight:700;color:var(--primary);font-size:14px;">${order.order_number}</div>
      </div>
      <div>
        <div style="font-size:11px;color:var(--text-muted);font-weight:700;margin-bottom:3px;">주문일시</div>
        <div style="font-weight:600;">${formatDate(order.created_at)}</div>
      </div>
      <div>
        <div style="font-size:11px;color:var(--text-muted);font-weight:700;margin-bottom:3px;">결제 상태</div>
        <span class="badge ${st.badge}">${st.label}</span>
      </div>
      <div>
        <div style="font-size:11px;color:var(--text-muted);font-weight:700;margin-bottom:3px;">결제 방법</div>
        <div style="font-weight:600;">${order.payment_method === 'bank_transfer' ? '🏦 계좌이체' : '💳 카드'}</div>
      </div>
    </div>

    <div style="background:var(--bg);border-radius:var(--radius-sm);padding:14px;margin-bottom:16px;">
      <div style="font-weight:700;margin-bottom:8px;font-size:13px;">🏠 배송지</div>
      <div style="font-size:14px;line-height:1.9;">
        <strong>${order.shipping_name}</strong> · ${order.shipping_phone}<br>
        ${order.shipping_address}
        ${order.note ? `<br><span style="color:var(--text-muted);font-size:12px;">메모: ${order.note}</span>` : ''}
      </div>
    </div>

    <div style="margin-bottom:16px;">
      <div style="font-weight:700;margin-bottom:10px;font-size:13px;">📦 주문 상품</div>
      ${items.map(item => `
        <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);">
          <div>
            <div style="font-weight:700;font-size:14px;margin-bottom:3px;">${escH(item.product_name)}</div>
            <div style="font-size:12px;color:var(--text-muted);">
              ${item.selected_color ? `색상: ${escH(item.selected_color)} · ` : ''}
              ${item.selected_size  ? `사이즈: ${escH(item.selected_size)} · ` : ''}
              ${item.selected_extra ? `추가: ${escH(item.selected_extra)} · ` : ''}
              수량: ${item.quantity}개
            </div>
          </div>
          <div style="font-weight:800;color:var(--primary);">${formatPrice(item.subtotal || item.product_price * item.quantity)}</div>
        </div>`).join('')}
    </div>

    <div style="background:var(--primary-light);border-radius:var(--radius-sm);padding:14px;">
      <div style="display:flex;justify-content:space-between;margin-bottom:6px;font-size:14px;">
        <span>상품금액</span><span>${formatPrice(order.total_price)}</span>
      </div>
      <div style="display:flex;justify-content:space-between;margin-bottom:6px;font-size:14px;">
        <span>배송비</span>

      </div>
      <div style="display:flex;justify-content:space-between;font-size:17px;font-weight:800;color:var(--primary);
                  border-top:1px solid var(--primary-border);padding-top:10px;margin-top:6px;">
        <span>최종 금액</span><span>${formatPrice(order.final_price)}</span>
      </div>
    </div>

    ${order.payment_status === 'pending' ? `
      <div style="margin-top:16px;">
        <button class="btn btn-warning btn-full" onclick="confirmTransfer('${order.id}');closeModal('orderDetailModal');">
          💰 입금 완료 알리기
        </button>

  openModal('orderDetailModal');

/* =====================================================
   입금완료 알리기
===================================================== */
async function confirmTransfer(orderId) {
  if (!confirm('입금 완료를 알리시겠습니까?\n관리자가 확인 후 결제 처리됩니다.')) return;
  showLoading();
  try {
    await API.patch('orders', orderId, {
      payment_status: 'transfer_confirmed',
      transfer_confirmed_at: Date.now()
    });
    const o = allMyOrders.find(o => o.id === orderId);
    if (o) o.payment_status = 'transfer_confirmed';
    renderOrders();
    toast('입금 완료가 전달되었습니다! 관리자가 곧 확인합니다.', 'success');
  } catch(e) {
    toast('처리 중 오류가 발생했습니다.', 'error');
  } finally { hideLoading(); }
}

/* =====================================================
   내 정보 저장
===================================================== */
async function saveInfo() {
  if (!userRecord) { toast('사용자 정보를 불러오지 못했습니다.', 'error'); return; }

  const phone  = document.getElementById('editPhone').value.trim();
  const zip    = document.getElementById('editZipcode').value.trim();
  const addr   = document.getElementById('editAddress').value.trim();
  const detail = document.getElementById('editAddressDetail').value.trim();

  if (!phone) { toast('휴대폰 번호를 입력해주세요.', 'warning'); return; }

  showLoading();
  try {
    await API.patch('users', userRecord.id, {
      phone,
      zipcode:        zip,
      address:        addr,
      address_detail: detail,
      // 로그인 시 전화번호 기반 인증이므로 password도 동기화
      password:       hashPassword(phone)
    });

    // 로컬 스토리지의 유저 정보도 갱신
    const updated = { ...currentUser, phone };
    Auth.setUser(updated);
    currentUser = updated;

    await loadUserRecord();
    toast('정보가 저장되었습니다! ✅', 'success');
  } catch(e) {
    console.error(e);
    toast('저장 중 오류가 발생했습니다.', 'error');
  } finally { hideLoading(); }
}

/* =====================================================
   비밀번호 변경
===================================================== */
function checkPwMatch() {
  const a = document.getElementById('pwNew').value;
  const b = document.getElementById('pwConfirm').value;
  const msg = document.getElementById('pwMatchMsg');
  if (!b) { msg.textContent = ''; return; }
  if (a === b) {
    msg.innerHTML = '<span style="color:var(--success);">✅ 비밀번호가 일치합니다</span>';
  } else {
    msg.innerHTML = '<span style="color:var(--danger);">❌ 비밀번호가 일치하지 않습니다</span>';
  }
}

async function savePw() {
  if (!userRecord) { toast('사용자 정보를 불러오지 못했습니다.', 'error'); return; }

  const cur     = document.getElementById('pwCurrent').value;
  const newPw   = document.getElementById('pwNew').value;
  const confirm = document.getElementById('pwConfirm').value;

  if (!cur)   { toast('현재 비밀번호를 입력해주세요.', 'warning'); return; }
  if (!newPw) { toast('새 비밀번호를 입력해주세요.', 'warning'); return; }
  if (newPw.length < 4) { toast('비밀번호는 4자 이상이어야 합니다.', 'warning'); return; }
  if (newPw !== confirm) { toast('새 비밀번호가 일치하지 않습니다.', 'warning'); return; }

  // 현재 비밀번호 확인 (hash 비교)
  if (hashPassword(cur) !== userRecord.password) {
    toast('현재 비밀번호가 올바르지 않습니다.', 'error'); return;
  }

  showLoading();
  try {
    await API.patch('users', userRecord.id, { password: hashPassword(newPw) });
    userRecord.password = hashPassword(newPw);
    document.getElementById('pwCurrent').value = '';
    document.getElementById('pwNew').value     = '';
    document.getElementById('pwConfirm').value = '';
    document.getElementById('pwMatchMsg').textContent = '';
    toast('비밀번호가 변경되었습니다! ✅', 'success');
  } catch(e) {
    toast('저장 중 오류가 발생했습니다.', 'error');
  } finally { hideLoading(); }
}

/* =====================================================
   주소 검색 (카카오 API)
===================================================== */
function openAddrSearch() {
  if (typeof daum === 'undefined' || !daum.Postcode) {
    toast('주소 검색 서비스를 불러오는 중입니다. 잠시 후 다시 시도해주세요.', 'warning');
    return;
  }
  new daum.Postcode({
    oncomplete: function(data) {
      document.getElementById('editZipcode').value = data.zonecode;
      document.getElementById('editAddress').value =
        data.roadAddress || data.jibunAddress;
      document.getElementById('editAddressDetail').focus();
    }
  }).open();
}

/* =====================================================
   전화번호 자동 포맷
===================================================== */
function formatPhoneEdit(el) {
  let v = el.value.replace(/\D/g, '').slice(0, 11);
  if (v.length >= 8) v = v.replace(/(\d{3})(\d{4})(\d{0,4})/, '$1-$2-$3');
  else if (v.length >= 4) v = v.replace(/(\d{3})(\d{0,4})/, '$1-$2');
  el.value = v;
}

/* =====================================================
   HTML 이스케이프
===================================================== */
function escH(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

init();
</script>
