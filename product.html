<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>상품 상세 - My Shop</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ── 레이아웃 ── */
    .pd-wrap {
      max-width: 1040px; margin: 0 auto; padding: 0 20px;
    }
    .pd-layout {
      display: grid; grid-template-columns: 1fr 1fr; gap: 48px; align-items: start;
    }
    @media(max-width:768px){ .pd-layout{ grid-template-columns:1fr; gap:24px; } }

    /* ── 갤러리 ── */
    .pd-gallery { position: sticky; top: 80px; }
    .pd-main-img {
      width: 100%; aspect-ratio: 1/1; border-radius: 16px;
      background: #f1f5f9; display: flex; align-items: center;
      justify-content: center; overflow: hidden;
      border: 1px solid var(--border); margin-bottom: 10px;
    }
    .pd-main-img img { width:100%; height:100%; object-fit:cover; display:block; }
    .pd-thumbs { display:flex; gap:8px; flex-wrap:wrap; }
    .pd-thumb {
      width: 68px; height: 68px; border-radius: 8px;
      border: 2px solid var(--border); overflow: hidden; cursor: pointer;
      background: #f1f5f9; display: flex; align-items: center;
      justify-content: center; font-size: 20px; transition: border-color .15s;
    }
    .pd-thumb:hover, .pd-thumb.active { border-color: var(--primary); }
    .pd-thumb img { width:100%; height:100%; object-fit:cover; }

    /* ── 상품 정보 ── */
    .pd-crumb {
      font-size: 13px; color: var(--text-muted); margin-bottom: 10px;
      display: flex; gap: 5px; align-items: center; flex-wrap: wrap;
    }
    .pd-crumb a:hover { color: var(--primary); }
    .pd-cat {
      display: inline-block; padding: 4px 12px;
      background: var(--primary-light); color: var(--primary);
      border-radius: 100px; font-size: 12px; font-weight: 700; margin-bottom: 12px;
    }
    .pd-name { font-size: 26px; font-weight: 800; line-height: 1.3; margin-bottom: 10px; }
    .pd-price { font-size: 32px; font-weight: 800; color: var(--primary); margin-bottom: 8px; }
    .pd-divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

    /* ── 옵션 공통 ── */
    .opt-group { margin-bottom: 20px; }
    .opt-title {
      font-size: 13px; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: .5px;
      margin-bottom: 10px; display: flex; align-items: center; gap: 6px;
    }
    .opt-req { font-size: 11px; color: var(--danger); font-weight: 700; }
    .opt-chosen { font-size: 13px; color: var(--primary); font-weight: 700; }

    /* ── 색상 버튼 ── */
    .color-row { display: flex; flex-wrap: wrap; gap: 8px; }
    .color-btn {
      display: flex; align-items: center; gap: 7px;
      padding: 7px 14px; border: 2px solid var(--border); border-radius: 8px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      background: white; transition: all .15s; user-select: none;
    }
    .color-btn:hover { border-color: var(--primary); transform: translateY(-1px); }
    .color-btn.on {
      border-color: var(--primary); background: var(--primary-light); color: var(--primary);
    }
    .color-dot {
      width: 16px; height: 16px; border-radius: 50%;
      border: 1px solid rgba(0,0,0,.15); flex-shrink: 0;
    }

    /* ── 사이즈 / 추가구성 버튼 ── */
    .chip-row { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip {
      padding: 9px 18px; border: 2px solid var(--border); border-radius: 8px;
      font-size: 13px; font-weight: 700; cursor: pointer;
      background: white; transition: all .15s; user-select: none;
    }
    .chip:hover { border-color: var(--primary); transform: translateY(-1px); }
    .chip.on {
      border-color: var(--primary); background: var(--primary); color: white;
    }

    /* ── 선택 요약 박스 ── */
    .sel-box {
      display: none;
      background: var(--primary-light); border: 1px solid var(--primary-border);
      border-radius: var(--radius-sm); padding: 14px 16px; margin: 16px 0;
    }
    .sel-box-title { font-size: 12px; font-weight: 700; color: var(--primary); margin-bottom: 8px; }
    .sel-box-body  { font-size: 14px; line-height: 1.9; }
    .sel-box-price { font-size: 16px; font-weight: 800; color: var(--primary); margin-top: 8px; }

    /* ── 배송 안내 바 ── */
    .ship-bar {
      background: var(--bg); border-radius: var(--radius-sm);
      padding: 11px 14px; font-size: 13px; color: var(--text-muted); margin-top: 12px;
    }

    /* ── 구매 버튼 ── */
    .buy-row { display: flex; gap: 12px; margin-top: 20px; }
    .buy-row .btn { flex: 1; }

    /* ── 탭 ── */
    .pd-tabs { max-width: 1040px; margin: 48px auto 0; padding: 0 20px; }
    .ship-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(180px,1fr));
      gap: 12px; margin-top: 14px;
    }
    .ship-card {
      background: var(--bg); border-radius: var(--radius-sm);
      padding: 14px; display: flex; align-items: flex-start; gap: 10px;
    }
    .ship-icon { font-size: 22px; }
    .ship-lbl  { font-size: 12px; color: var(--text-muted); }
    .ship-val  { font-weight: 700; font-size: 14px; margin-top: 2px; }
  </style>
</head>
<body>
<header class="header" id="mainHeader"></header>

<main class="page-content" id="mainContent">
  <div style="text-align:center;padding:80px;color:var(--text-muted);">
    <div class="spinner" style="margin:0 auto 20px;"></div>
    <p>불러오는 중...</p>
  </div>
</main>

<!-- 장바구니 담기 완료 모달 -->
<div class="modal-overlay" id="cartModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">🛒 장바구니에 담겼습니다!</div>
      <button class="modal-close" onclick="closeModal('cartModal')">✕</button>
    </div>
    <div class="modal-body" id="cartModalBody"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('cartModal')">쇼핑 계속</button>
      <a href="cart.html" class="btn btn-primary">장바구니 보기 →</a>
    </div>
  </div>
</div>

<footer class="footer" style="margin-top:48px;">
  <div class="footer-bottom" style="text-align:center;">
    <a href="index.html" style="color:#94a3b8;">← 목록으로 돌아가기</a>
  </div>
</footer>
<div class="toast-container"></div>
<script src="js/utils.js"></script>
<script>
/* =====================================================
   전역 상태
===================================================== */
let product       = null;   // 현재 상품 데이터
let productColors = [];     // 색상 배열
let productSizes  = [];     // 사이즈 배열
let productExtras = [];     // 추가구성 배열
let selColor      = '';
let selSize       = '';
let selExtra      = '';
let qty           = 1;
let shippingFee   = 3000;
let freeThreshold = 50000;

/* =====================================================
   초기화
===================================================== */
async function init() {
  await renderHeader('products');

  // 배송비 설정 로드
  try {
    const s = await Settings.getAll();
    if (s.shipping_fee_standard)       shippingFee   = parseInt(s.shipping_fee_standard);
    if (s.shipping_fee_free_threshold) freeThreshold = parseInt(s.shipping_fee_free_threshold);
  } catch(e) {}

  // URL에서 상품 ID 추출
  const id = new URLSearchParams(location.search).get('id');
  if (!id) { location.href = 'index.html'; return; }

  await loadProduct(id);
}

/* =====================================================
   상품 데이터 로드
===================================================== */
async function loadProduct(id) {
  try {
    const data = await API.getOne('products', id);
    if (!data || !data.id) throw new Error('not found');
    product = data;
    document.title = product.name + ' - My Shop';

    // 옵션 배열 파싱 (전역 변수로 저장)
    productColors = safeArr(product.colors);
    productSizes  = safeArr(product.sizes);
    productExtras = safeArr(product.extra_options);

    renderProduct();
  } catch(err) {
    console.error('loadProduct error:', err);
    document.getElementById('mainContent').innerHTML = `
      <div class="empty-state">
        <div class="icon">😕</div>
        <h3>상품을 찾을 수 없습니다</h3>
        <a href="index.html" class="btn btn-primary" style="margin-top:20px;">홈으로</a>
      </div>`;
  }
}

/* =====================================================
   배열 안전 파싱 - DB에서 오는 다양한 형식 모두 처리
===================================================== */
function safeArr(val) {
  if (!val) return [];

  // 이미 배열
  if (Array.isArray(val)) {
    return val.map(v => String(v ?? '').trim()).filter(Boolean);
  }

  // 문자열
  if (typeof val === 'string') {
    const t = val.trim();
    if (!t || t === '[]' || t === 'null' || t === '""') return [];

    // JSON 배열
    if (t.startsWith('[')) {
      try {
        const p = JSON.parse(t);
        if (Array.isArray(p)) return p.map(v => String(v ?? '').trim()).filter(Boolean);
      } catch {}
    }

    // 이중 인코딩된 JSON 문자열 ( "\"[...]\"" )
    if (t.startsWith('"')) {
      try {
        const inner = JSON.parse(t);
        if (typeof inner === 'string') {
          const p = JSON.parse(inner);
          if (Array.isArray(p)) return p.map(v => String(v).trim()).filter(Boolean);
        }
      } catch {}
    }

    // 콤마 구분
    return t.split(',').map(s => s.trim()).filter(Boolean);
  }

  return [];
}

/* =====================================================
   상품 렌더링
===================================================== */
function renderProduct() {
  // 초기화
  selColor = ''; selSize = ''; selExtra = ''; qty = 1;

  const stock   = parseInt(product.stock ?? 0);
  const images  = safeArr(product.images);
  const allImgs = [product.thumbnail, ...images].filter(Boolean);

  /* ── 갤러리 ── */
  const galleryHtml = `
    <div class="pd-main-img" id="mainImgBox">
      ${product.thumbnail
        ? `<img src="${esc(product.thumbnail)}" alt="${esc(product.name)}"
               onerror="this.parentElement.innerHTML='<span style=\\'font-size:80px\\'>🛍️</span>'">`
        : '<span style="font-size:80px">🛍️</span>'}
    </div>
    ${allImgs.length > 1 ? `
      <div class="pd-thumbs">
        ${allImgs.map((img, i) => `
          <div class="pd-thumb ${i === 0 ? 'active' : ''}" onclick="changeImg(this, '${escQ(img)}')">
            <img src="${esc(img)}" alt="" onerror="this.parentElement.innerHTML='🛍️'">
          </div>`).join('')}
      </div>` : ''}`;

  /* ── 색상 옵션 ── */
  const colorBlock = productColors.length > 0 ? `
    <div class="opt-group">
      <div class="opt-title">
        색상 <span class="opt-req">필수</span>
        <span class="opt-chosen" id="lblColor"></span>
      </div>
      <div class="color-row" id="colorRow">
        ${productColors.map((c, i) => `
          <button type="button" class="color-btn" id="cb${i}" onclick="pickColor(${i})">
            <span class="color-dot" style="background:${getColorHex(c)};"></span>
            ${esc(c)}
          </button>`).join('')}
      </div>
    </div>` : '';

  /* ── 사이즈 옵션 ── */
  const sizeBlock = productSizes.length > 0 ? `
    <div class="opt-group">
      <div class="opt-title">
        사이즈 <span class="opt-req">필수</span>
        <span class="opt-chosen" id="lblSize"></span>
      </div>
      <div class="chip-row" id="sizeRow">
        ${productSizes.map((s, i) => `
          <button type="button" class="chip" id="sb${i}" onclick="pickSize(${i})">${esc(s)}</button>`).join('')}
      </div>
    </div>` : '';

  /* ── 추가구성 옵션 ── */
  const extraBlock = productExtras.length > 0 ? `
    <div class="opt-group">
      <div class="opt-title">
        추가구성 <span class="opt-req">필수</span>
        <span class="opt-chosen" id="lblExtra"></span>
      </div>
      <div class="chip-row" id="extraRow">
        ${productExtras.map((ex, i) => `
          <button type="button" class="chip" id="eb${i}" onclick="pickExtra(${i})">${esc(ex)}</button>`).join('')}
      </div>
    </div>` : '';

  /* ── 재고 뱃지 ── */
  const stockBadge = stock === 0
    ? `<span class="badge badge-danger" style="margin-bottom:8px;display:inline-block;">품절</span>`
    : stock <= 5
      ? `<span class="badge badge-warning" style="margin-bottom:8px;display:inline-block;">⚡ 잔여 ${stock}개</span>`
      : '';

  /* ── 유통기한 표시 ── */
  const expiryHtml = product.expiry_date ? `
    <div style="margin-bottom:14px;padding:10px 14px;background:#fffbeb;border:1.5px solid #fde68a;border-radius:8px;display:inline-flex;align-items:center;gap:8px;font-size:13px;color:#92400e;">
      <span style="font-size:18px;">📅</span>
      <div>
        <div style="font-weight:600;">유통기한</div>
        <div style="font-size:14px;font-weight:700;color:#0f766e;margin-top:2px;">${esc(product.expiry_date)}</div>
      </div>
    </div>` : '';

  /* ── 구매 버튼 ── */
  const isLoggedIn = !!Auth.getUser();
  let buyBtns = '';
  if (stock === 0) {
    buyBtns = `<button class="btn btn-secondary btn-lg btn-full" disabled>품절</button>`;
  } else if (!isLoggedIn) {
    buyBtns = `
      <button class="btn btn-outline btn-lg btn-full" onclick="goLogin()">🔒 로그인 후 구매 가능</button>
      <p style="text-align:center;margin-top:10px;font-size:12px;color:var(--text-muted);">
        <a href="register.html" style="color:var(--primary);font-weight:600;">회원가입</a>
        하고 로그인하면 구매할 수 있습니다
      </p>`;
  } else {
    buyBtns = `
      <button class="btn btn-outline btn-lg" onclick="addCart()">🛒 장바구니</button>
      <button class="btn btn-primary btn-lg" onclick="buyNow()">⚡ 바로구매</button>`;
  }

  /* ── 최종 HTML 삽입 ── */
  document.getElementById('mainContent').innerHTML = `
    <div class="pd-wrap">
      <div class="pd-layout">

        <!-- 갤러리 -->
        <div class="pd-gallery">${galleryHtml}</div>

        <!-- 상품 정보 -->
        <div class="pd-info">
          <!-- 브레드크럼 -->
          <div class="pd-crumb">
            <a href="index.html">홈</a> <span>›</span>
            ${product.category ? `<a href="index.html">${esc(product.category)}</a> <span>›</span>` : ''}
            <span>${esc(product.name)}</span>
          </div>

          ${product.category ? `<span class="pd-cat">${esc(product.category)}</span>` : ''}
          <h1 class="pd-name">${esc(product.name)}</h1>
          <div class="pd-price">${formatPrice(product.price)}</div>
          ${stockBadge}
          ${expiryHtml}

          <hr class="pd-divider">

          <!-- 옵션 선택 영역 -->
          ${colorBlock}
          ${sizeBlock}
          ${extraBlock}

          <!-- 수량 -->
          <div class="opt-group">
            <div class="opt-title">수량</div>
            <div style="display:flex;align-items:center;gap:14px;">
              <div class="qty-selector">
                <button class="qty-btn" onclick="chgQty(-1)">−</button>
                <input type="number" class="qty-input" id="qtyInput"
                       value="1" min="1" max="${stock || 999}"
                       onchange="setQty(this.value)">
                <button class="qty-btn" onclick="chgQty(1)">+</button>
              </div>
              ${stock > 0 ? `<span style="font-size:13px;color:var(--text-muted);">재고 ${stock}개</span>` : ''}
            </div>
          </div>

          <!-- 선택 요약 -->
          <div class="sel-box" id="selBox">
            <div class="sel-box-title">📋 선택 내역</div>
            <div class="sel-box-body" id="selBoxBody"></div>
            <div class="sel-box-price" id="selBoxPrice"></div>
          </div>

          <!-- 배송 안내 -->
          <div class="ship-bar">
            🚚 배송비 <strong>${formatPrice(shippingFee)}</strong>
            &nbsp;·&nbsp; ${formatPrice(freeThreshold)} 이상 무료배송
          </div>

          <!-- 버튼 -->
          <div class="buy-row" id="buyRow">${buyBtns}</div>
        </div>
      </div>
    </div>

    <!-- 탭 -->
    <div class="pd-tabs">
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab(this,'tdesc')">상품 설명</button>
        <button class="tab-btn" onclick="switchTab(this,'tship')">배송 안내</button>
        <button class="tab-btn" onclick="switchTab(this,'treturn')">교환/반품</button>
      </div>

      <div id="tdesc">
        <div style="background:white;border-radius:var(--radius);border:1px solid var(--border);
                    padding:24px;line-height:1.9;font-size:15px;white-space:pre-wrap;">
          ${product.description
            ? esc(product.description)
            : '<span style="color:var(--text-muted)">상품 설명이 없습니다.</span>'}
        </div>
      </div>

      <div id="tship" style="display:none;">
        <div class="ship-grid">
          <div class="ship-card"><div class="ship-icon">📦</div><div><div class="ship-lbl">배송 방법</div><div class="ship-val">택배 배송</div></div></div>
          <div class="ship-card"><div class="ship-icon">💰</div><div><div class="ship-lbl">배송비</div><div class="ship-val">${formatPrice(shippingFee)} (${formatPrice(freeThreshold)} 이상 무료)</div></div></div>
          <div class="ship-card"><div class="ship-icon">📅</div><div><div class="ship-lbl">배송 기간</div><div class="ship-val">결제 확인 후 2~3일</div></div></div>
          <div class="ship-card"><div class="ship-icon">🏝️</div><div><div class="ship-lbl">도서산간</div><div class="ship-val">추가 배송비 발생</div></div></div>
        </div>
      </div>

      <div id="treturn" style="display:none;">
        <div style="background:white;border-radius:var(--radius);border:1px solid var(--border);padding:24px;">
          <ul style="list-style:disc;padding-left:20px;color:var(--text-muted);font-size:14px;line-height:2.2;">
            <li>상품 수령 후 7일 이내 교환·반품 가능</li>
            <li>단순 변심의 경우 왕복 배송비 고객 부담</li>
            <li>상품 불량·오배송 시 배송비 전액 당사 부담</li>
            <li>착용·세탁·훼손된 상품은 교환·반품 불가</li>
            <li>교환·반품 문의: 관리자에게 직접 연락</li>
          </ul>
        </div>
      </div>
    </div>
  `;

  // 옵션 없으면 바로 수량 요약 표시
  refreshSelBox();
}

/* =====================================================
   HTML 이스케이프
===================================================== */
function esc(s)  { return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escQ(s) { return String(s ?? '').replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

/* =====================================================
   이미지 전환
===================================================== */
function changeImg(el, src) {
  const box = document.getElementById('mainImgBox');
  if (box) box.innerHTML = `<img src="${src}" alt="" style="width:100%;height:100%;object-fit:cover;"
    onerror="this.parentElement.innerHTML='<span style=\\'font-size:80px\\'>🛍️</span>'">`;
  document.querySelectorAll('.pd-thumb').forEach(t => t.classList.remove('active'));
  if (el) el.classList.add('active');
}

/* =====================================================
   탭 전환
===================================================== */
function switchTab(btn, tabId) {
  document.querySelectorAll('.pd-tabs .tab-btn').forEach(b => b.classList.remove('active'));
  ['tdesc','tship','treturn'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.display = 'none';
  });
  btn.classList.add('active');
  const tab = document.getElementById(tabId);
  if (tab) tab.style.display = 'block';
}

/* =====================================================
   옵션 선택
===================================================== */
function pickColor(idx) {
  selColor = productColors[idx] ?? '';
  // 버튼 UI 갱신
  document.querySelectorAll('#colorRow .color-btn').forEach(b => b.classList.remove('on'));
  const btn = document.getElementById('cb' + idx);
  if (btn) btn.classList.add('on');
  // 레이블
  const lbl = document.getElementById('lblColor');
  if (lbl) lbl.textContent = selColor ? ': ' + selColor : '';
  refreshSelBox();
}

function pickSize(idx) {
  selSize = productSizes[idx] ?? '';
  document.querySelectorAll('#sizeRow .chip').forEach(b => b.classList.remove('on'));
  const btn = document.getElementById('sb' + idx);
  if (btn) btn.classList.add('on');
  const lbl = document.getElementById('lblSize');
  if (lbl) lbl.textContent = selSize ? ': ' + selSize : '';
  refreshSelBox();
}

function pickExtra(idx) {
  selExtra = productExtras[idx] ?? '';
  document.querySelectorAll('#extraRow .chip').forEach(b => b.classList.remove('on'));
  const btn = document.getElementById('eb' + idx);
  if (btn) btn.classList.add('on');
  const lbl = document.getElementById('lblExtra');
  if (lbl) lbl.textContent = selExtra ? ': ' + selExtra : '';
  refreshSelBox();
}

/* =====================================================
   수량 조절
===================================================== */
function chgQty(d) {
  const max = parseInt(product?.stock ?? 0) || 999;
  qty = Math.max(1, Math.min(max, qty + d));
  const inp = document.getElementById('qtyInput');
  if (inp) inp.value = qty;
  refreshSelBox();
}

function setQty(v) {
  const max = parseInt(product?.stock ?? 0) || 999;
  qty = Math.max(1, Math.min(max, parseInt(v) || 1));
  const inp = document.getElementById('qtyInput');
  if (inp) inp.value = qty;
  refreshSelBox();
}

/* =====================================================
   선택 요약 박스 갱신
===================================================== */
function refreshSelBox() {
  const box   = document.getElementById('selBox');
  const body  = document.getElementById('selBoxBody');
  const price = document.getElementById('selBoxPrice');
  if (!box || !product) return;

  // 옵션이 하나도 없거나, 뭔가 선택됐으면 표시
  const hasOpts = productColors.length > 0 || productSizes.length > 0 || productExtras.length > 0;
  const hasSel  = selColor || selSize || selExtra;

  if (!hasOpts || hasSel) {
    box.style.display = 'block';
    const lines = [];
    if (selColor)  lines.push(`색상: <strong>${esc(selColor)}</strong>`);
    if (selSize)   lines.push(`사이즈: <strong>${esc(selSize)}</strong>`);
    if (selExtra)  lines.push(`추가구성: <strong>${esc(selExtra)}</strong>`);
    lines.push(`수량: <strong>${qty}개</strong>`);
    body.innerHTML = lines.join('&nbsp;&nbsp;·&nbsp;&nbsp;');

    const subtotal = product.price * qty;
    const ship     = subtotal >= freeThreshold ? 0 : shippingFee;
    price.innerHTML = `
      상품금액 <strong>${formatPrice(subtotal)}</strong>
      &nbsp;+&nbsp;
      배송비 <span style="${ship === 0 ? 'color:var(--success);font-weight:700;' : ''}">
        ${ship === 0 ? '무료' : formatPrice(ship)}
      </span>`;
  } else {
    box.style.display = 'none';
  }
}

/* =====================================================
   옵션 유효성 검사
===================================================== */
function validateOpts() {
  if (productColors.length > 0 && !selColor) {
    toast('색상을 선택해주세요.', 'warning'); return false;
  }
  if (productSizes.length > 0 && !selSize) {
    toast('사이즈를 선택해주세요.', 'warning'); return false;
  }
  if (productExtras.length > 0 && !selExtra) {
    toast('추가구성을 선택해주세요.', 'warning'); return false;
  }
  return true;
}

/* =====================================================
   실시간 재고 확인
===================================================== */
async function checkStock() {
  try {
    const latest = await API.getOne('products', product.id);
    const ls = parseInt(latest.stock ?? 0);
    if (ls <= 0) {
      toast('😢 죄송합니다. 방금 품절되었습니다.', 'error');
      product.stock = 0;
      const row = document.getElementById('buyRow');
      if (row) row.innerHTML = `<button class="btn btn-secondary btn-lg btn-full" disabled>품절</button>`;
      return false;
    }
    if (qty > ls) {
      toast(`⚠️ 최대 구매 가능 수량은 ${ls}개입니다.`, 'warning');
      qty = ls;
      const inp = document.getElementById('qtyInput');
      if (inp) inp.value = qty;
      product.stock = ls;
      refreshSelBox();
      return false;
    }
    product.stock = ls;
    return true;
  } catch { return true; }
}

/* =====================================================
   로그인 유도
===================================================== */
function goLogin() {
  toast('로그인이 필요합니다. 로그인 페이지로 이동합니다.', 'warning');
  const returnUrl = encodeURIComponent(location.href);
  setTimeout(() => { window.location.href = 'login.html?from=' + returnUrl; }, 900);
}

/* =====================================================
   장바구니 담기
===================================================== */
async function addCart() {
  if (!Auth.getUser()) { goLogin(); return; }
  if (!validateOpts()) return;
  if (!await checkStock()) return;

  Cart.add({
    product_id:        product.id,
    product_name:      product.name,
    product_price:     product.price,
    product_thumbnail: product.thumbnail || '',
    selected_color:    selColor,
    selected_size:     selSize,
    selected_extra:    selExtra,
    quantity:          qty
  });

  showCartModal();
  toast('장바구니에 담겼습니다! 🛒', 'success');
}

function showCartModal() {
  const subtotal = product.price * qty;
  const ship     = subtotal >= freeThreshold ? 0 : shippingFee;
  const opts     = [selColor, selSize, selExtra].filter(Boolean).join(' / ');

  document.getElementById('cartModalBody').innerHTML = `
    <div style="display:flex;gap:14px;align-items:center;margin-bottom:16px;">
      <div style="width:68px;height:68px;border-radius:8px;background:#f1f5f9;
                  display:flex;align-items:center;justify-content:center;
                  font-size:28px;overflow:hidden;flex-shrink:0;border:1px solid var(--border);">
        ${product.thumbnail
          ? `<img src="${esc(product.thumbnail)}" style="width:100%;height:100%;object-fit:cover;"
               onerror="this.parentElement.innerHTML='🛍️'">`
          : '🛍️'}
      </div>
      <div>
        <div style="font-weight:700;margin-bottom:4px;">${esc(product.name)}</div>
        <div style="font-size:13px;color:var(--text-muted);">${opts ? opts + ' / ' : ''}${qty}개</div>
        <div style="font-weight:800;color:var(--primary);margin-top:4px;">${formatPrice(subtotal)}</div>
      </div>
    </div>
    <div style="background:var(--bg);padding:12px;border-radius:8px;font-size:13px;">
      <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
        <span>장바구니 상품</span>
        <span style="font-weight:600;">${Cart.count()}개</span>
      </div>
      <div style="display:flex;justify-content:space-between;">
        <span>배송비</span>
        <span style="font-weight:600;${ship === 0 ? 'color:var(--success)' : ''}">
          ${ship === 0 ? '무료' : formatPrice(ship)}
        </span>
      </div>
    </div>`;
  openModal('cartModal');
}

/* =====================================================
   바로 구매
===================================================== */
async function buyNow() {
  if (!Auth.getUser()) { goLogin(); return; }
  if (!validateOpts()) return;
  if (!await checkStock()) return;

  const item = {
    product_id:        product.id,
    product_name:      product.name,
    product_price:     product.price,
    product_thumbnail: product.thumbnail || '',
    selected_color:    selColor,
    selected_size:     selSize,
    selected_extra:    selExtra,
    quantity:          qty,
    cart_key: `${product.id}__${selColor}__${selSize}__${selExtra}`
  };
  localStorage.setItem('shop_buy_now', JSON.stringify([item]));
  window.location.href = 'checkout.html?mode=buynow';
}

/* =====================================================
   실행
===================================================== */
init();
</script>
</body>
</html>
