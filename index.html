<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>해이린 쇼핑몰</title>

  <style>
    body {
      font-family: 'Arial', sans-serif;
      background: #f5f7fa;
      margin: 0;
    }

    header {
      background: #00c2a8;
      color: white;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .container {
      padding: 30px;
      text-align: center;
    }

    h1 {
      margin-bottom: 10px;
    }

    button {
      padding: 10px 15px;
      border: none;
      background: #ff5c5c;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #e04b4b;
    }

    .product-box {
      margin-top: 30px;
      padding: 20px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.1);
    }
  </style>
</head>

<body>

<header>
  <div>해이린 쇼핑몰</div>
  <div>
    <span id="userNickname"></span>
    <button onclick="logout()">로그아웃</button>
  </div>
</header>

<div class="container">
  <h1>환영합니다 🎉</h1>
  <p>로그인된 사용자만 볼 수 있는 페이지입니다.</p>

  <div class="product-box">
    <h3>🔥 오늘의 추천 상품</h3>
    <p>여기에 상품을 넣으면 진짜 쇼핑몰 시작됨</p>
  </div>
</div>

<script>
window.onload = function() {
  const isLoggedIn = localStorage.getItem("isLoggedIn");
  const user = JSON.parse(localStorage.getItem("user"));

  // 로그인 안 되어 있으면 차단
  if (isLoggedIn !== "true" || !user) {
    alert("로그인이 필요합니다.");
    window.location.href = "login.html";
    return;
  }

  // 닉네임 표시
  document.getElementById("userNickname").innerText = user.nickname + "님";
};

// 로그아웃
function logout() {
  localStorage.removeItem("isLoggedIn");
  alert("로그아웃 되었습니다.");
  window.location.href = "login.html";
}
</script>

</body>
</html>
