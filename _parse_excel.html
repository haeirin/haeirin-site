<!DOCTYPE html>
<html>
<head><meta charset="UTF-8">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>
<div id="out" style="white-space:pre;font-family:monospace;font-size:12px;padding:20px;"></div>
<script>
async function run() {
  try {
    const res = await fetch('temp_excel.xlsx');
    const ab  = await res.arrayBuffer();
    const wb  = XLSX.read(new Uint8Array(ab), { type: 'array' });
    let out = 'SheetNames: ' + JSON.stringify(wb.SheetNames) + '\n\n';
    wb.SheetNames.forEach(name => {
      out += `=== 시트: "${name}" ===\n`;
      const ws   = wb.Sheets[name];
      const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
      rows.slice(0, 10).forEach((row, i) => {
        out += `  행${i+1}: ${JSON.stringify(row)}\n`;
      });
      out += '\n';
    });
    document.getElementById('out').textContent = out;
    console.log('DONE:', out);
  } catch(e) {
    console.error('ERR', e.message);
    document.getElementById('out').textContent = 'ERROR: ' + e.message;
  }
}
run();
</script>
</body>
</html>
